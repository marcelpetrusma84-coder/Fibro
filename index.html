<style>
* { box-sizing:border-box; margin:0; padding:0; }
:root { --bg:#1a0a2e; --card:rgba(255,255,255,0.06); --border:rgba(255,255,255,0.12); --accent:#c084fc; --accent2:#f0abfc; --text:#f3e8ff; --muted:#ffffff; }
body { background:var(--bg); background-attachment:fixed; background-size:cover; background-position:center; font-family:'DM Sans',sans-serif; color:var(--text); max-width:480px; margin:0 auto; min-height:100vh; overflow-y:auto; }
.top-bar { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:rgba(0,0,0,0.35); border-bottom:0.5px solid var(--border); position:sticky; top:0; z-index:10; }
.top-title { font-family:'Playfair Display',serif; font-style:italic; font-size:18px; color:var(--accent); }
.top-icons { display:flex; gap:12px; align-items:center; }
.eigenaar-badge { font-size:15px; padding:3px 10px; border-radius:20px; background:rgba(192,132,252,0.15); border:0.5px solid var(--accent); color:var(--accent); cursor:pointer; }
.theme-bar { display:flex; gap:8px; padding:10px 16px; border-bottom:0.5px solid var(--border); align-items:center; }
.theme-dot { width:22px; height:22px; border-radius:50%; cursor:pointer; border:2px solid transparent; }
.theme-dot.active { border-color:var(--text); }
.t1 { background:linear-gradient(135deg,#c084fc,#818cf8); }
.t2 { background:linear-gradient(135deg,#f59e4a,#a3522a); }
.t3 { background:linear-gradient(135deg,#38bdf8,#1e3a5f); }
.t4 { background:linear-gradient(135deg,#f472b6,#c026d3); }
.profile-hero { padding:20px 16px 14px; display:flex; gap:14px; align-items:flex-start; }
.avatar-ring { width:64px; height:64px; border-radius:50%; padding:2.5px; background:linear-gradient(135deg,var(--accent),var(--accent2)); flex-shrink:0; cursor:pointer; }
.avatar-inner { width:100%; height:100%; border-radius:50%; background:var(--bg); display:flex; align-items:center; justify-content:center; font-size:26px; }
.p-name { font-family:'Playfair Display',serif; font-size:20px; font-weight:600; cursor:pointer; }
.p-bio { font-size:12px; color:var(--muted); margin-top:3px; cursor:pointer; }
.p-tags { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
.tag { font-size:15px; padding:3px 9px; border-radius:20px; border:0.5px solid var(--accent); color:var(--accent); }
.edit-vak { background:var(--card); border:0.5px solid var(--border); border-radius:14px; padding:14px; margin-bottom:10px; }
.edit-field { width:100%; background:rgba(255,255,255,0.05); border:0.5px solid var(--accent); border-radius:8px; padding:7px 10px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:15px; outline:none; margin-bottom:8px; display:block; }
.edit-label { font-size:15px; color:var(--muted); margin-bottom:4px; display:block; text-transform:uppercase; letter-spacing:0.08em; }
.save-btn { font-size:14px; padding:6px 14px; border-radius:20px; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#1a0a2e; border:none; cursor:pointer; font-weight:500; }
.cancel-btn { font-size:14px; padding:6px 14px; border-radius:20px; background:var(--card); color:var(--muted); border:0.5px solid var(--border); cursor:pointer; margin-left:6px; }
.emoji-picker { display:flex; flex-wrap:wrap; gap:8px; padding:10px; background:var(--card); border:0.5px solid var(--border); border-radius:12px; margin:0 16px 10px; }
.emoji-opt { font-size:24px; cursor:pointer; padding:4px; border-radius:8px; }
.nav-tabs { display:flex; padding:0 16px; border-bottom:0.5px solid var(--border); }
.nav-tab { font-size:12px; padding:9px 12px; color:var(--muted); border-bottom:2px solid transparent; cursor:pointer; }
.nav-tab.active { color:var(--accent); border-bottom-color:var(--accent); }
.blocks { padding:12px 14px; display:flex; flex-direction:column; gap:10px; }
.block { background:var(--card); border:0.5px solid var(--border); border-radius:14px; padding:13px 14px; }
.block-title { font-size:14px; font-weight:500; color:var(--accent); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:10px; }
.gb-entry { display:flex; gap:9px; padding:7px 0; border-bottom:0.5px solid var(--border); }
.gb-entry:last-child { border-bottom:none; }
.gb-av { width:28px; height:28px; border-radius:50%; background:rgba(192,132,252,0.15); border:0.5px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:12px; flex-shrink:0; }
.gb-name { font-size:14px; font-weight:500; }
.gb-msg { font-size:14px; color:var(--muted); margin-top:2px; }
.gb-time { font-size:12px; color:var(--muted); opacity:0.6; margin-top:2px; }
.gb-input { display:flex; gap:8px; margin-top:10px; }
.gb-field { flex:1; background:rgba(255,255,255,0.05); border:0.5px solid var(--border); border-radius:20px; padding:7px 14px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:12px; outline:none; }
.gb-send { padding:7px 14px; border-radius:20px; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#1a0a2e; border:none; cursor:pointer; font-size:12px; font-weight:500; }
.photo-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:5px; }
.photo-cell { aspect-ratio:1; border-radius:8px; background:rgba(192,132,252,0.1); border:0.5px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:22px; }
.music-row { display:flex; align-items:center; gap:10px; }
.music-icon { width:38px; height:38px; border-radius:8px; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
.music-title { font-size:15px; font-weight:500; }
.music-artist { font-size:14px; color:var(--muted); }
.music-bar { height:3px; background:var(--border); border-radius:2px; margin-top:6px; overflow:hidden; }
.music-progress { height:100%; width:40%; background:var(--accent); border-radius:2px; }
.mood-row { display:flex; align-items:center; gap:10px; }
.mood-emoji { font-size:28px; }
.mood-text { font-size:15px; font-weight:500; }
.mood-sub { font-size:14px; color:var(--muted); margin-top:2px; }
.chat-btn { width:100%; padding:11px; border-radius:12px; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#1a0a2e; border:none; cursor:pointer; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:500; margin-top:10px; }
.bottom-nav { display:flex; justify-content:space-around; padding:12px 0; border-top:0.5px solid var(--border); background:rgba(0,0,0,0.3); position:fixed; bottom:0; width:100%; max-width:480px; z-index:10; }
.nav-item { display:flex; flex-direction:column; align-items:center; gap:3px; font-size:15px; color:#ffffff; cursor:pointer; padding:4px 12px; text-shadow:0 1px 4px rgba(0,0,0,0.9); }
.nav-item.active { color:var(--accent); }
.nav-icon { font-size:20px; }
.fibro-logo { font-family:'Playfair Display',serif; font-style:italic; font-size:12px; color:var(--accent); text-align:center; padding:12px; opacity:0.5; }

/* Opslaan status */
.opslaan-status { font-size:14px; color:var(--accent); margin-top:6px; display:none; }
.opslaan-status.show { display:block; }

/* Uitloggen knop */
.uitlog-btn { font-size:15px; padding:3px 10px; border-radius:20px; background:transparent; border:0.5px solid var(--border); color:var(--muted); cursor:pointer; }
.uitlog-btn:hover { border-color:var(--muted); color:var(--text); }

/* Laden overlay */
.laden { text-align:center; padding:40px; color:var(--muted); font-size:15px; }
body::before{content:'';position:fixed;inset:0;background:rgba(0,0,0,0.38);z-index:0;pointer-events:none;display:none;}body.heeft-wallpaper::before{display:block;}body.heeft-wallpaper{background-size:cover;background-position:center;background-attachment:fixed;}.block,.edit-vak,.bottom-nav,.top-bar{backdrop-filter:blur(12px)}.p-name,.p-bio,.block-title,.mood-text{text-shadow:0 1px 4px rgba(0,0,0,0.9)}
.wallpaper-bg {
  position: fixed;
  inset: 0;
  z-index: -1;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}
input, textarea { font-size:16px !important; }
</style>
</head>

<script type="module">
  import { laadThema } from './thema.js'
import { laadWallpaper } from './wallpaper.js'

  // IndexedDB
  function openDB() {
    return new Promise((resolve, reject) => {
      const req = indexedDB.open('FibroDB', 1)
      req.onupgradeneeded = e => e.target.result.createObjectStore('fotos', { keyPath: 'id' })
      req.onsuccess = e => resolve(e.target.result)
      req.onerror = () => reject('DB fout')
    })
  }
  async function laadFotoUitDB(id) {
    const db = await openDB()
    return new Promise((resolve) => {
      const req = db.transaction('fotos').objectStore('fotos').get(id)
      req.onsuccess = e => resolve(e.target.result?.data || null)
      req.onerror = () => resolve(null)
    })
  }
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

  const supabase = createClient(
    'https://qmgatbphiplrfxrljtbe.supabase.co',
    'sb_publishable_pyFn83YMR7K2O8K1s7g4YQ_mSJZwGSf'
  )

  var isEigenaar = false
  var huidigeProfiel = null
  var huidigeUser = null
  var emojis = ["🌿","🌸","🎸","📷","🚀","🌙","🦋","🎨","🌊","🍂","⭐","🎵","🌺","🦊","🐱","🌈","🎮","📚","🌻","🍀"]

  // ========================
  // OPSTARTEN
async function init() {
    const { data: { session } } = await supabase.auth.getSession()

    if (!session) {
      window.location.href = 'login.html'
      return
    }

    huidigeUser = session.user
    await laadThema()
    await laadProfiel()
    await laadGastenboek()
    await laadVriendenCache()
    // Cache opruimen
    const vriendIds = JSON.parse(localStorage.getItem('actieve_vriend_ids') || '[]')
    import('./cache.js').then(m => m.ruimCacheOp(vriendIds))
  }

  // ========================
  // VRIENDEN CACHE LADEN
  // ========================
  async function laadVriendenCache() {
    try {
      const { data: friendships } = await supabase
        .from('friendships')
        .select('user_id, friend_id')
        .or(`user_id.eq.${huidigeUser.id},friend_id.eq.${huidigeUser.id}`)
        .eq('status', 'accepted')

      if (!friendships || friendships.length === 0) return

      const vriendIds = friendships.map(f =>
        f.user_id === huidigeUser.id ? f.friend_id : f.user_id
      )

      const { data } = await supabase
        .from('profiles')
        .select('*')
        .in('id', vriendIds)

      if (!data) return

      // Sla actieve vriend IDs op voor cache opruim
      try {
        localStorage.setItem('actieve_vriend_ids', JSON.stringify(data.map(v => v.id)))
      } catch(e) {}

      data.forEach(vriend => {
        try {
          localStorage.setItem('vriend_cache_' + vriend.id, JSON.stringify({
            naam: vriend.display_name || vriend.username || '',
            bio: vriend.bio || '',
            mood: vriend.mood || '',
            avatar: vriend.avatar_url || '👤',
            accent_kleur: vriend.accent_kleur || '',
            accent_kleur2: vriend.accent_kleur2 || '',
            achtergrond_kleur: vriend.achtergrond_kleur || '',
            lettertype: vriend.lettertype || '',
            online_status: vriend.online_status || false,
            offline_emoji: vriend.offline_emoji || '🌙',
            offline_bericht: vriend.offline_bericht || 'Offline',
            bijgewerkt: new Date().toISOString()
          }))
        } catch(e) {}
      })
    } catch(e) {}
  }

  // ========================
  // PROFIEL LADEN
  // ========================
  async function laadProfiel() {
    const { data, error } = await supabase
      .from('profiles')
      .select('*')
      .eq('id', huidigeUser.id)
      .single()

    if (error || !data) {
      // Profiel bestaat nog niet, maak een basis aan
      document.getElementById('profielNaam').textContent = huidigeUser.email.split('@')[0]
      document.getElementById('profielBio').textContent = 'Klik om je bio in te stellen'
      document.getElementById('avatarEmoji').textContent = '🌿'
      document.getElementById('moodTekst').textContent = 'Stel je mood in'
      document.getElementById('eigenaarBadge').textContent = 'Eigenaar'
      isEigenaar = true
      return
    }

    huidigeProfiel = data

    // Vul profiel in — alles uit localStorage
    const _lokaalP = JSON.parse(localStorage.getItem('fibro_profiel')||'{}')
    if(document.getElementById('editNaam')) document.getElementById('editNaam').value = _lokaalP.naam||''
    document.getElementById('profielNaam').textContent = _lokaalP.naam || data.username || 'Naamloos'
    document.getElementById('profielBio').textContent = _lokaalP.bio || 'Klik om je bio in te stellen'
    document.getElementById('moodTekst').textContent = _lokaalP.mood || 'Geen mood ingesteld'
    const userId = huidigeUser?.id || 'lokaal'
    const opgeslagenFoto = await laadFotoUitDB('avatar_thumbnail_' + userId)
    if (opgeslagenFoto) {
      document.getElementById('avatarEmoji').innerHTML = `<img src="${opgeslagenFoto}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`
    } else {
      document.getElementById('avatarEmoji').textContent = _lokaalP.avatar || data.avatar_url || '🌿'
    }
    document.getElementById('eigenaarBadge').textContent = 'Eigenaar'
    isEigenaar = true

    // Thema toepassen
    if (data.theme) setThemeByName(data.theme)
  }

  // ========================
  // GASTENBOEK LADEN
  // ========================
  async function laadGastenboek() {
    const { data, error } = await supabase
      .from('guestbook_entries')
      .select('*, author:author_id(username, avatar_url)')
      .eq('profile_id', huidigeUser.id)
      .order('created_at', { ascending: false })
      .limit(10)

    const container = document.getElementById('gbEntries')

    if (error || !data || data.length === 0) {
      container.innerHTML = '<div style="font-size:12px;color:var(--muted);padding:8px 0;">Nog geen berichten. Nodig vrienden uit!</div>'
      return
    }

    container.innerHTML = data.map(entry => {
      const initiaal = (entry.author?.username || '?')[0].toUpperCase()
      const avatar = entry.author?.avatar_url || initiaal
      const tijd = tijdGeleden(entry.created_at)
      return `
        <div class="gb-entry">
          <div class="gb-av">${avatar}</div>
          <div>
            <div class="gb-name">${entry.author?.username || 'Onbekend'}</div>
            <div class="gb-msg">${entry.content}</div>
            <div class="gb-time">${tijd}</div>
          </div>
        </div>
      `
    }).join('')
  }

  // ========================
  // GASTENBOEK STUREN
  // ========================
  window.sendGb = async function() {
    const input = document.getElementById('gbInput')
    const tekst = input.value.trim()
    if (!tekst) return

    const { error } = await supabase
      .from('guestbook_entries')
      .insert({
        profile_id: huidigeUser.id,
        author_id: huidigeUser.id,
        content: tekst
      })

    if (!error) {
      input.value = ''
      await laadGastenboek()
    }
  }

  // ========================
  // PROFIEL BEWERKEN
  // ========================
  window.toggleEigenaar = function() {
    isEigenaar = !isEigenaar
    const badge = document.getElementById('eigenaarBadge')
    const balk = document.getElementById('themaBalk')
    if (isEigenaar) {
      badge.textContent = 'Eigenaar'
      badge.style.color = 'var(--accent2)'
      badge.style.borderColor = 'var(--accent2)'
      balk.style.display = 'block'
    } else {
      badge.textContent = 'Bezoeker'
      badge.style.color = 'var(--accent)'
      badge.style.borderColor = 'var(--accent)'
      balk.style.display = 'none'
      annuleerBewerk()
      document.getElementById('avatarPickerWrap').style.display = 'none'
    }
  }

  window.openBewerk = function() {
    if (!isEigenaar) return
    document.getElementById('editNaam').value = document.getElementById('profielNaam').textContent
    document.getElementById('editBio').value = document.getElementById('profielBio').textContent
    document.getElementById('editMood').value = document.getElementById('moodTekst').textContent
    document.getElementById('profielWeergave').style.display = 'none'
    document.getElementById('profielBewerk').style.display = 'block'
  }

  window.annuleerBewerk = function() {
    document.getElementById('profielBewerk').style.display = 'none'
    document.getElementById('profielWeergave').style.display = 'block'
  }

  // ========================
  // PROFIEL OPSLAAN IN SUPABASE
  // ========================
  window.slaProfielOp = async function() {
    const naam = document.getElementById('editNaam').value.trim()
    // Lokaal opslaan
    const lokaal = JSON.parse(localStorage.getItem('fibro_profiel') || '{}')
    lokaal.naam = naam
    localStorage.setItem('fibro_profiel', JSON.stringify(lokaal))
    const bio = document.getElementById('editBio').value.trim()
    const mood = document.getElementById('editMood').value.trim()
    const status = document.getElementById('opslaanStatus')

    const { error } = await supabase
      .from('profiles')
      .upsert({
        id: huidigeUser.id,
        username: huidigeProfiel?.username || huidigeUser.email.split('@')[0],
        bio: bio,
        mood: mood,
        updated_at: new Date().toISOString()
      })

    if (error) {
      status.textContent = '✗ Opslaan mislukt'
      status.style.color = '#ff5c5c'
      status.classList.add('show')
      return
    }

    // UI bijwerken
    document.getElementById('profielNaam').textContent = naam
    document.getElementById('profielBio').textContent = bio
    document.getElementById('moodTekst').textContent = mood

    status.textContent = '✓ Opgeslagen!'
    status.style.color = 'var(--accent)'
    status.classList.add('show')

    setTimeout(() => {
      status.classList.remove('show')
      annuleerBewerk()
    }, 1500)
  }

  // ========================
  // AVATAR PICKER
  // ========================
  window.openAvatarPicker = function() {
    if (!isEigenaar) return
    const wrap = document.getElementById('avatarPickerWrap')
    if (wrap.style.display !== 'none') { wrap.style.display = 'none'; return }
    const picker = document.getElementById('emojiPicker')
    picker.innerHTML = ''
    emojis.forEach(e => {
      const span = document.createElement('span')
      span.className = 'emoji-opt'
      span.textContent = e
      span.onclick = async () => {
        document.getElementById('avatarEmoji').textContent = e
        wrap.style.display = 'none'
        await supabase.from('profiles').upsert({
          id: huidigeUser.id,
          username: huidigeProfiel?.username || huidigeUser.email.split('@')[0],
          avatar_url: e,
          updated_at: new Date().toISOString()
        })
      }
      picker.appendChild(span)
    })
    wrap.style.display = 'block'
  }

  // ========================
  // THEMA
  // ========================
  var themes = {
    purple:{bg:"#1a0a2e",accent:"#c084fc",accent2:"#f0abfc"},
    cottage:{bg:"#2d1f14",accent:"#f59e4a",accent2:"#fcd34d"},
    space:{bg:"#030712",accent:"#38bdf8",accent2:"#7dd3fc"},
    kawaii:{bg:"#2a0a3e",accent:"#f472b6",accent2:"#e879f9"},
  }

  window.setTheme = async function(name, dot) {
    setThemeByName(name)
    document.querySelectorAll('.theme-dot').forEach(d => d.classList.remove('active'))
    if (dot) dot.classList.add('active')
    await supabase.from('profiles').upsert({
      id: huidigeUser.id,
      username: huidigeProfiel?.username || huidigeUser.email.split('@')[0],
      theme: name,
      updated_at: new Date().toISOString()
    })
  }

  function setThemeByName(name) {
    const t = themes[name]
    if (!t) return
    document.documentElement.style.setProperty('--bg', t.bg)
    document.documentElement.style.setProperty('--accent', t.accent)
    document.documentElement.style.setProperty('--accent2', t.accent2)
  }

  // ========================
  // MUZIEK
  // ========================
  var musicOn = false
  window.toggleMusic = function() {
    musicOn = !musicOn
    document.getElementById('musicBtn').textContent = musicOn ? '🔇' : '🎵'
  }

  // ========================
  // UITLOGGEN
  // ========================
  window.uitloggen = async function() {
    await supabase.auth.signOut()
    window.location.href = 'login.html'
  }

  // ========================
  // HULPFUNCTIE: TIJD GELEDEN
  // ========================
  function tijdGeleden(datum) {
    const nu = new Date()
    const dan = new Date(datum)
    const diff = Math.floor((nu - dan) / 1000)
    if (diff < 60) return 'Zojuist'
    if (diff < 3600) return Math.floor(diff/60) + ' minuten geleden'
    if (diff < 86400) return Math.floor(diff/3600) + ' uur geleden'
    return Math.floor(diff/86400) + ' dagen geleden'
  }

  // Start
  init()
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/service-worker.js')
}
</script>
