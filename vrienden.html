<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fibro - Vrienden</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
:root { --bg:#1a0a2e; --card:rgba(255,255,255,0.06); --border:rgba(255,255,255,0.12); --accent:#c084fc; --accent2:#f0abfc; --text:#f3e8ff; --muted:rgba(243,232,255,0.5); }
body { background:var(--bg); font-family:"DM Sans",sans-serif; color:var(--text); max-width:480px; margin:0 auto; min-height:100vh; }
.top-bar { display:flex; align-items:center; gap:10px; padding:12px 16px; background:rgba(0,0,0,0.35); border-bottom:0.5px solid var(--border); position:sticky; top:0; z-index:10; }
.top-title { font-family:"Playfair Display",serif; font-style:italic; font-size:18px; color:var(--accent); flex:1; }
.invite-btn { font-size:11px; padding:5px 12px; border-radius:20px; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#1a0a2e; border:none; cursor:pointer; font-weight:500; }
.search-bar { padding:10px 14px; border-bottom:0.5px solid var(--border); }
.search-input { width:100%; background:var(--card); border:0.5px solid var(--border); border-radius:20px; padding:8px 14px; color:var(--text); font-size:12px; outline:none; }
.section-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; padding:12px 16px 6px; }
.friend-row { display:flex; align-items:center; gap:12px; padding:12px 16px; border-bottom:0.5px solid var(--border); cursor:pointer; }
.f-avatar { width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; border:1.5px solid var(--border); position:relative; }
.f-avatar.purple { border-color:rgba(192,132,252,0.4); background:rgba(192,132,252,0.1); }
.f-avatar.blue { border-color:rgba(56,189,248,0.4); background:rgba(56,189,248,0.1); }
.f-avatar.pink { border-color:rgba(244,114,182,0.4); background:rgba(244,114,182,0.1); }
.f-avatar.orange { border-color:rgba(245,158,74,0.4); background:rgba(245,158,74,0.1); }
.online-dot { width:10px; height:10px; border-radius:50%; background:#4ade80; border:2px solid var(--bg); position:absolute; bottom:1px; right:1px; }
.online-dot.off { background:var(--muted); }
.f-info { flex:1; }
.f-name { font-size:14px; font-weight:500; }
.f-bio { font-size:11px; color:var(--muted); margin-top:2px; }
.f-status { font-size:10px; margin-top:3px; }
.f-status.on { color:#4ade80; }
.f-status.off { color:var(--muted); }
.f-arrow { color:var(--muted); font-size:16px; }
.f-btn { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:var(--card); border:0.5px solid var(--border); cursor:pointer; font-size:14px; }
.bottom-nav { display:flex; justify-content:space-around; padding:12px 0; border-top:0.5px solid var(--border); background:rgba(0,0,0,0.3); position:sticky; bottom:0; }
.nav-item { display:flex; flex-direction:column; align-items:center; gap:3px; font-size:10px; color:var(--muted); cursor:pointer; padding:4px 12px; }
.nav-item.active { color:var(--accent); }
.nav-icon { font-size:20px; }
.fibro-logo { font-family:"Playfair Display",serif; font-style:italic; font-size:11px; color:var(--accent); text-align:center; padding:12px; opacity:0.5; }
</style>
</head>
<body>
<div class="top-bar">
  <span class="top-title">Vrienden</span>
  <button class="invite-btn" onclick="window.location.href='http://localhost:4000/login.html'">+ Uitnodigen</button>
</div>
<div class="search-bar">
  <input class="search-input" id="searchInput" placeholder="Zoek een vriend..." oninput="filterVrienden()">
</div>
<div id="vriendenLijst">
  <div class="section-label">Online</div>
  <div class="friend-row" onclick="window.location.href='http://localhost:4000/index.html'">
    <div class="f-avatar pink">🌸<div class="online-dot"></div></div>
    <div class="f-info"><div class="f-name">Zoe</div><div class="f-bio">Anime en Gaming Fan</div><div class="f-status on">online</div></div>
    <div class="f-btn" onclick="event.stopPropagation();window.location.href='http://localhost:4000/chat.html'">💬</div>
    <div class="f-arrow">&#8250;</div>
  </div>
  <div class="friend-row" onclick="window.location.href='http://localhost:4000/index.html'">
    <div class="f-avatar blue">🎸<div class="online-dot"></div></div>
    <div class="f-info"><div class="f-name">Evan</div><div class="f-bio">Guitarist en Music Lover</div><div class="f-status on">online</div></div>
    <div class="f-btn" onclick="event.stopPropagation();window.location.href='http://localhost:4000/chat.html'">💬</div>
    <div class="f-arrow">&#8250;</div>
  </div>
  <div class="section-label">Offline</div>
  <div class="friend-row" onclick="window.location.href='http://localhost:4000/index.html'">
    <div class="f-avatar orange">📷<div class="online-dot off"></div></div>
    <div class="f-info"><div class="f-name">Lucas</div><div class="f-bio">Street Photographer</div><div class="f-status off">verborgen</div></div>
    <div class="f-btn" onclick="event.stopPropagation();window.location.href='http://localhost:4000/chat.html'">💬</div>
    <div class="f-arrow">&#8250;</div>
  </div>
  <div class="friend-row" onclick="window.location.href='http://localhost:4000/index.html'">
    <div class="f-avatar purple">🌙<div class="online-dot off"></div></div>
    <div class="f-info"><div class="f-name">Mia</div><div class="f-bio">Photographer en Traveller</div><div class="f-status off">2 uur geleden</div></div>
    <div class="f-btn" onclick="event.stopPropagation();window.location.href='http://localhost:4000/chat.html'">💬</div>
    <div class="f-arrow">&#8250;</div>
  </div>
</div>
<div class="fibro-logo">Fibro - jouw netwerk</div>
<div class="bottom-nav">
  <div class="nav-item" onclick="window.location.href='http://localhost:4000/index.html'"><div class="nav-icon">🏠</div>Home</div>
  <div class="nav-item active"><div class="nav-icon">👥</div>Vrienden</div>
  <div class="nav-item" onclick="window.location.href='http://localhost:4000/chat.html'"><div class="nav-icon">💬</div>Chat</div>
  <div class="nav-item" onclick="window.location.href='http://localhost:4000/login.html'"><div class="nav-icon">👤</div>Profiel</div>
</div>
<script>
function filterVrienden() {
  var query = document.getElementById("searchInput").value.toLowerCase();
  var rows = document.querySelectorAll(".friend-row");
  rows.forEach(function(row) {
    var naam = row.querySelector(".f-name").textContent.toLowerCase();
    if (naam.indexOf(query) !== -1) { row.style.display="flex"; }
    else { row.style.display="none"; }
  });
  document.querySelectorAll(".section-label").forEach(function(l) {
    l.style.display = query ? "none" : "block";
  });
}
</script>
</body>
</html>
