<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fibro - Vrienden</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
:root { --bg:#1a0a2e; --card:rgba(255,255,255,0.06); --border:rgba(255,255,255,0.12); --accent:#c084fc; --accent2:#f0abfc; --text:#f3e8ff; --muted:rgba(243,232,255,0.5); }
body { background:var(--bg); font-family:"DM Sans",sans-serif; color:var(--text); max-width:480px; margin:0 auto; min-height:100vh; }
.top-bar { display:flex; align-items:center; gap:10px; padding:12px 16px; background:rgba(0,0,0,0.35); border-bottom:0.5px solid var(--border); position:sticky; top:0; z-index:10; }
.top-title { font-family:"Playfair Display",serif; font-style:italic; font-size:18px; color:var(--accent); flex:1; }
.invite-btn { font-size:11px; padding:5px 12px; border-radius:20px; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#1a0a2e; border:none; cursor:pointer; font-weight:500; }
.search-bar { padding:10px 14px; border-bottom:0.5px solid var(--border); }
.search-input { width:100%; background:var(--card); border:0.5px solid var(--border); border-radius:20px; padding:8px 14px; color:var(--text); font-size:12px; outline:none; }
.section-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; padding:12px 16px 6px; }
.friend-row { display:flex; align-items:center; gap:12px; padding:12px 16px; border-bottom:0.5px solid var(--border); cursor:pointer; }
.f-avatar { width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; border:1.5px solid var(--border); position:relative; }
.f-avatar.purple { border-color:rgba(192,132,252,0.4); background:rgba(192,132,252,0.1); }
.f-avatar.blue { border-color:rgba(56,189,248,0.4); background:rgba(56,189,248,0.1); }
.f-avatar.pink { border-color:rgba(244,114,182,0.4); background:rgba(244,114,182,0.1); }
.f-avatar.orange { border-color:rgba(245,158,74,0.4); background:rgba(245,158,74,0.1); }
.online-dot { width:10px; height:10px; border-radius:50%; background:#4ade80; border:2px solid var(--bg); position:absolute; bottom:1px; right:1px; }
.online-dot.off { background:var(--muted); }
.f-info { flex:1; }
.f-name { font-size:14px; font-weight:500; }
.f-bio { font-size:11px; color:var(--muted); margin-top:2px; }
.f-status { font-size:10px; margin-top:3px; }
.f-status.on { color:#4ade80; }
.f-status.off { color:var(--muted); }
.f-arrow { color:var(--muted); font-size:16px; }
.f-btn { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:var(--card); border:0.5px solid var(--border); cursor:pointer; font-size:14px; }
.bottom-nav { display:flex; justify-content:space-around; padding:12px 0; border-top:0.5px solid var(--border); background:rgba(0,0,0,0.3); position:sticky; bottom:0; }
.nav-item { display:flex; flex-direction:column; align-items:center; gap:3px; font-size:10px; color:var(--muted); cursor:pointer; padding:4px 12px; }
.nav-item.active { color:var(--accent); }
.nav-icon { font-size:20px; }
.fibro-logo { font-family:"Playfair Display",serif; font-style:italic; font-size:11px; color:var(--accent); text-align:center; padding:12px; opacity:0.5; }

/* ======================== */
/* QR MODAL */
/* ======================== */
.modal-overlay {
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.8);
  z-index:100;
  align-items:center;
  justify-content:center;
  padding:24px;
  backdrop-filter:blur(8px);
}
.modal-overlay.open { display:flex; }

.modal {
  background:#1a0a2e;
  border:1px solid rgba(192,132,252,0.3);
  border-radius:20px;
  padding:28px 24px;
  width:100%;
  max-width:340px;
  text-align:center;
  animation:fadeUp 0.3s ease both;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to { opacity:1; transform:translateY(0); }
}

.modal h2 {
  font-family:"Playfair Display",serif;
  font-style:italic;
  font-size:22px;
  color:var(--accent);
  margin-bottom:6px;
}

.modal p {
  font-size:12px;
  color:var(--muted);
  margin-bottom:20px;
  line-height:1.5;
}

/* QR code container */
#qr-container {
  background:white;
  border-radius:12px;
  padding:16px;
  display:inline-block;
  margin-bottom:20px;
}

/* Timer */
.timer-ring {
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  margin-bottom:20px;
}

.timer-text {
  font-size:13px;
  color:var(--muted);
}

.timer-countdown {
  font-size:16px;
  font-weight:600;
  color:var(--accent);
  font-variant-numeric:tabular-nums;
  min-width:48px;
}

.timer-countdown.warning { color:#f59e0b; }
.timer-countdown.expired { color:#ff5c5c; }

/* Progress bar */
.progress-bar {
  width:100%;
  height:3px;
  background:rgba(255,255,255,0.1);
  border-radius:2px;
  margin-bottom:20px;
  overflow:hidden;
}

.progress-fill {
  height:100%;
  background:linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius:2px;
  transition:width 1s linear;
}

/* Token code */
.token-code {
  background:rgba(192,132,252,0.1);
  border:1px dashed rgba(192,132,252,0.3);
  border-radius:8px;
  padding:10px;
  font-size:11px;
  color:var(--accent);
  letter-spacing:1px;
  margin-bottom:20px;
  word-break:break-all;
}

/* Buttons */
.modal-btn {
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  font-family:"DM Sans",sans-serif;
  font-size:13px;
  cursor:pointer;
  margin-bottom:8px;
  transition:all 0.2s;
}

.modal-btn-primary {
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#1a0a2e;
  font-weight:600;
}

.modal-btn-primary:hover { opacity:0.9; transform:translateY(-1px); }
.modal-btn-primary:disabled { opacity:0.4; cursor:not-allowed; transform:none; }

.modal-btn-ghost {
  background:transparent;
  color:var(--muted);
  border:1px solid var(--border);
}

.modal-btn-ghost:hover { color:var(--text); border-color:var(--muted); }

/* Status bericht */
.modal-status {
  font-size:12px;
  padding:8px 12px;
  border-radius:8px;
  margin-bottom:12px;
  display:none;
}
.modal-status.error { background:rgba(255,92,92,0.1); color:#ff5c5c; border:1px solid rgba(255,92,92,0.2); display:block; }
.modal-status.success { background:rgba(192,132,252,0.1); color:var(--accent); border:1px solid rgba(192,132,252,0.2); display:block; }

/* Verlopen staat */
.expired-overlay {
  display:none;
  flex-direction:column;
  align-items:center;
  gap:12px;
  padding:20px 0;
}
.expired-overlay.show { display:flex; }
.expired-icon { font-size:40px; }
</style>
</head>
<body>

<div class="top-bar">
  <span class="top-title">Vrienden</span>
  <button class="invite-btn" onclick="openInviteModal()">+ Uitnodigen</button>
</div>

<div class="search-bar">
</div>

<div id="vriendenLijst">
  <div style="padding:20px; text-align:center; color:var(--muted); font-size:12px;">Vrienden laden...</div>
</div>

<div class="fibro-logo">Fibro - jouw netwerk</div>

<div class="bottom-nav">
  <div class="nav-item" onclick="window.location.href='index.html'"><div class="nav-icon">🏠</div>Home</div>
  <div class="nav-item active"><div class="nav-icon">👥</div>Vrienden</div>
  <div class="nav-item" onclick="window.location.href='chat.html'"><div class="nav-icon">💬</div>Chat</div>
  <div class="nav-item" onclick="window.location.href='profiel.html'"><div class="nav-icon">👤</div>Profiel</div>
</div>

<!-- ======================== -->
<!-- QR INVITE MODAL -->
<!-- ======================== -->
<div class="modal-overlay" id="inviteModal" onclick="sluitModalBuiten(event)">
  <div class="modal">
    <h2>Vriend uitnodigen</h2>
    <p>Genereer een QR code. Je vriend heeft 20 minuten om zich te registreren.</p>

    <div class="modal-status" id="modal-status"></div>

    <!-- QR code weergave -->
    <div id="qr-sectie" style="display:none;">
      <div id="qr-container"></div>

      <div class="timer-ring">
        <span class="timer-text">Geldig nog:</span>
        <span class="timer-countdown" id="timer-display">20:00</span>
      </div>

      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>

      <div class="token-code" id="token-display"></div>

      <!-- Verlopen staat -->
      <div class="expired-overlay" id="expired-overlay">
        <div class="expired-icon">⏰</div>
        <p style="margin:0;">Deze invite is verlopen.</p>
        <button class="modal-btn modal-btn-primary" onclick="nieuweInvite()">Nieuwe QR genereren</button>
      </div>
    </div>

    <!-- Laden staat -->
    <div id="qr-laden" style="padding:20px 0; color:var(--muted); font-size:13px;">
      Even laden...
    </div>

    <button class="modal-btn modal-btn-ghost" onclick="sluitModal()">Sluiten</button>
  </div>
</div>

<script type="module">

  import { laadThema } from './thema.js'
  import { supabase } from './supabase.js'
  import { startHeartbeat } from './heartbeat.js'

  function isGebruikerOnline(profiel) {
    if (!profiel.online_status) return false
    if (!profiel.laatst_gezien) return false
    const sec = (Date.now() - new Date(profiel.laatst_gezien).getTime()) / 1000
    return sec < 150
  }

  async function init() {
    await laadThema()
    const { data: { session } } = await supabase.auth.getSession()
    if (!session) { window.location.href = 'login.html'; return }
    await startHeartbeat()
    await laadVrienden(session.user.id)
  }

  async function laadVrienden(userId) {
    const { data, error } = await supabase
      .from('friendships')
      .select('friend_id, profiles!friendships_friend_id_fkey(id, username, display_name, bio, avatar_url, mood, online_status, offline_emoji, offline_bericht, laatst_gezien)')
      .eq('user_id', userId)
      .eq('status', 'accepted')

    const container = document.getElementById('vriendenLijst')

    if (error || !data || data.length === 0) {
      container.innerHTML = '<div style="padding:40px 20px;text-align:center;color:var(--muted);font-size:15px;line-height:1.8;">👥 Nog geen vrienden.<br>Klik op <strong style=\"color:var(--accent)\">+ Uitnodigen</strong> om iemand uit te nodigen!</div>'
      return
    }

    const gesorteerd = [...data].sort((a, b) => (isGebruikerOnline(b.profiles) ? 1 : 0) - (isGebruikerOnline(a.profiles) ? 1 : 0))
    const online = gesorteerd.filter(f => isGebruikerOnline(f.profiles))
    const offline = gesorteerd.filter(f => !isGebruikerOnline(f.profiles))

    function bouwRij(f) {
      const p = f.profiles
      const avatar = p.avatar_url || '👤'
      const naam = p.display_name || p.username
      const bio = p.bio || ''
      const online = isGebruikerOnline(p)
      const stipKleur = online ? '#22c55e' : '#6b7280'
      const statusTekst = online
        ? (p.mood ? '<span style="font-size:12px;color:var(--accent2);font-style:italic;">' + p.mood + '</span>' : '')
        : '<span style="font-size:12px;color:var(--muted);">' + (p.offline_bericht ? (p.offline_emoji || '💤') + ' ' + p.offline_bericht : 'Offline') + '</span>'
      return '<div class="friend-row" onclick="window.location.href=\'vriend-profiel.html?id=' + p.id + '\'" style="display:flex;align-items:center;gap:12px;padding:12px 16px;margin:6px 12px;background:rgba(0,0,0,0.45);border:0.5px solid rgba(255,255,255,0.08);border-radius:18px;backdrop-filter:blur(16px);cursor:pointer;">' +
        '<div style="position:relative;flex-shrink:0;">' +
        '<div style="width:46px;height:46px;border-radius:50%;background:rgba(192,132,252,0.15);border:1.5px solid rgba(192,132,252,0.3);display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden;">' + avatar + '</div>' +
        '<span style="position:absolute;bottom:1px;right:1px;width:11px;height:11px;border-radius:50%;background:' + stipKleur + ';border:2px solid #0a0014;display:block;"></span>' +
        '</div>' +
        '<div style="flex:1;min-width:0;">' +
        '<div style="font-size:14px;font-weight:600;color:#f3e8ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + naam + '</div>' +
        '<div style="font-size:12px;color:rgba(255,255,255,0.45);margin-top:1px;">@' + (p.username || naam) + '</div>' +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">' +
        '<span style="font-size:16px;opacity:0.6;">' + (p.public_key ? '🔒' : '🔓') + '</span>' +
        '<span style="position:relative;display:inline-flex;align-items:center;" onclick="event.stopPropagation();window.location.href=\'chat.html?id=' + p.id + '&naam=' + encodeURIComponent(naam) + '&avatar=' + encodeURIComponent(avatar) + '\'">' +
        '<span style="font-size:22px;line-height:1;cursor:pointer;">💬</span>' +
        '<span style="position:absolute;bottom:-1px;right:-2px;width:9px;height:9px;border-radius:50%;background:' + stipKleur + ';border:1.5px solid rgba(0,0,0,0.5);"></span>' +
        '</span>' +
        '</div>' +
        '</div>'
    }

    let html = ''
    if (online.length > 0) html += '<div class="section-label">🟢 Online (' + online.length + ')</div>' + online.map(bouwRij).join('')
    if (offline.length > 0) html += '<div class="section-label">⚫ Offline (' + offline.length + ')</div>' + offline.map(bouwRij).join('')
    container.innerHTML = html
  }

  init()

</script>
<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

  const supabase = createClient(
    'https://qmgatbphiplrfxrljtbe.supabase.co',
    'sb_publishable_pyFn83YMR7K2O8K1s7g4YQ_mSJZwGSf'
  )

  const DUUR = 20 * 60 // 20 minuten in seconden
  let timerInterval = null
  let secondsLeft = DUUR

  // ========================
  // MODAL OPENEN
  // ========================
  window.openInviteModal = async function() {
    document.getElementById('inviteModal').classList.add('open')
    await genereerInvite()
  }

  window.sluitModal = function() {
    document.getElementById('inviteModal').classList.remove('open')
    clearInterval(timerInterval)
  }

  window.sluitModalBuiten = function(e) {
    if (e.target.id === 'inviteModal') sluitModal()
  }

  // ========================
  // INVITE GENEREREN
  // ========================
  async function genereerInvite() {
    document.getElementById('qr-laden').style.display = 'block'
    document.getElementById('qr-sectie').style.display = 'none'
    document.getElementById('expired-overlay').classList.remove('show')
    clearInterval(timerInterval)

    // Haal ingelogde gebruiker op
    const { data: { user } } = await supabase.auth.getUser()

    // Genereer uniek token
    const token = 'fibro-' + Math.random().toString(36).substring(2, 10) + '-' + Date.now().toString(36)
    const verlooptOm = new Date(Date.now() + DUUR * 1000).toISOString()

    // Sla op in Supabase
    const { error } = await supabase
      .from('invite_tokens')
      .insert({
        token: token,
        expires_at: verlooptOm,
        ...(user ? { created_by: user.id } : {})
      })

    if (error) {
      toonStatus('error', 'Kon geen invite aanmaken. Probeer opnieuw.')
      document.getElementById('qr-laden').style.display = 'none'
      return
    }

    // Toon QR code
    document.getElementById('qr-laden').style.display = 'none'
    document.getElementById('qr-sectie').style.display = 'block'
    document.getElementById('token-display').textContent = token

    // Maak QR code
    document.getElementById('qr-container').innerHTML = ''
    new QRCode(document.getElementById('qr-container'), {
      text: token,
      width: 200,
      height: 200,
      colorDark: '#1a0a2e',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    })

    // Start timer
    secondsLeft = DUUR
    updateTimer()
    timerInterval = setInterval(() => {
      secondsLeft--
      updateTimer()
      if (secondsLeft <= 0) {
        clearInterval(timerInterval)
        toonVerlopen()
      }
    }, 1000)
  }

  // ========================
  // TIMER UPDATEN
  // ========================
  function updateTimer() {
    const minuten = Math.floor(secondsLeft / 60)
    const seconden = secondsLeft % 60
    const display = document.getElementById('timer-display')
    const progress = document.getElementById('progress-fill')

    display.textContent = `${String(minuten).padStart(2,'0')}:${String(seconden).padStart(2,'0')}`

    // Kleur aanpassen
    display.className = 'timer-countdown'
    if (secondsLeft <= 60) display.classList.add('expired')
    else if (secondsLeft <= 300) display.classList.add('warning')

    // Progress bar
    const percentage = (secondsLeft / DUUR) * 100
    progress.style.width = percentage + '%'
  }

  // ========================
  // VERLOPEN WEERGAVE
  // ========================
  function toonVerlopen() {
    document.getElementById('expired-overlay').classList.add('show')
    document.getElementById('timer-display').className = 'timer-countdown expired'
    document.getElementById('timer-display').textContent = '00:00'
    document.getElementById('progress-fill').style.width = '0%'
  }

  // ========================
  // NIEUWE INVITE
  // ========================
  window.nieuweInvite = async function() {
    await genereerInvite()
  }

  // ========================
  // STATUS BERICHT
  // ========================
  function toonStatus(type, tekst) {
    const el = document.getElementById('modal-status')
    el.className = 'modal-status ' + type
    el.textContent = tekst
  }
</script>

<script>
function filterVrienden() {
  var query = document.getElementById("searchInput").value.toLowerCase();
  var rows = document.querySelectorAll(".friend-row");
  rows.forEach(function(row) {
    var naam = row.querySelector(".f-name").textContent.toLowerCase();
    row.style.display = naam.indexOf(query) !== -1 ? "flex" : "none";
  });
  document.querySelectorAll(".section-label").forEach(function(l) {
    l.style.display = query ? "none" : "block";
  });
}
</script>

</body>
</html>
