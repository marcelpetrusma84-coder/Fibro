<!DOCTYPE html>
<html lang="nl" style="background:#1a0a2e;">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fibro - Vrienden</title>
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fibro">
<meta name="theme-color" content="#c084fc">
  <meta name="theme-color" content="#c084fc">
<script>
  try {
    const f = localStorage.getItem('fibro_font')
    if (f) document.write('<style>*{font-family:' + f + ' !important}</style>')
  } catch(e) {}
</script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400;500&family=Raleway:wght@300;400;500&family=Lora:ital,wght@0,400;0,600;1,400&family=Merriweather:wght@300;400;700&family=Bebas+Neue&family=Oswald:wght@300;400;500&family=Pacifico&family=Dancing+Script:wght@400;600&family=Great+Vibes&family=Space+Mono:wght@400;700&family=Courier+Prime:wght@400;700&family=Quicksand:wght@300;400;500&family=Nunito:wght@300;400;500&family=Righteous&family=Comfortaa:wght@300;400;500&family=Cinzel:wght@400;600&family=Satisfy&family=Lobster&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
:root { --bg:#1a0a2e; --card:rgba(255,255,255,0.06); --border:rgba(255,255,255,0.12); --accent:#c084fc; --accent2:#f0abfc; --text:#f3e8ff; --muted:#ffffff; }
body { background:var(--bg); background-attachment:fixed; background-size:cover; background-position:center; font-family:"DM Sans",sans-serif; color:var(--text); max-width:480px; margin:0 auto; min-height:100vh; padding-bottom:70px; overflow-y:auto; }
.top-bar { display:flex; align-items:center; gap:10px; padding:12px 16px; background:rgba(0,0,0,0.35); border-bottom:0.5px solid var(--border); position:sticky; top:0; z-index:10; backdrop-filter:blur(12px); }
.top-title { font-family:"Playfair Display",serif; font-style:italic; font-size:18px; color:var(--accent); flex:1; }
.invite-btn { font-size:14px; padding:5px 12px; border-radius:20px; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#1a0a2e; border:none; cursor:pointer; font-weight:500; min-height:44px; }
.search-bar { padding:10px 14px; border-bottom:0.5px solid var(--border); }
.search-input { width:100%; background:var(--card); border:0.5px solid var(--border); border-radius:20px; padding:8px 14px; color:var(--text); font-size:16px; outline:none; }
.section-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; padding:12px 16px 6px; }
.friend-row { display:flex; align-items:center; gap:12px; padding:14px 16px; margin:8px 14px; border:0.5px solid var(--border); border-radius:16px; cursor:pointer; background:var(--card); backdrop-filter:blur(12px); transition:border-color 0.2s; }
.friend-row:hover { border-color:var(--accent); }
.f-avatar { width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; border:1.5px solid rgba(192,132,252,0.4); background:rgba(192,132,252,0.1); }
.f-info { flex:1; }
.f-name { font-size:14px; font-weight:500; }
.f-bio { font-size:12px; color:var(--muted); margin-top:2px; }
.f-mood { font-size:12px; color:var(--accent2); margin-top:3px; font-style:italic; }
.f-arrow { color:var(--muted); font-size:16px; }
.f-btn { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; background:var(--card); border:0.5px solid var(--border); cursor:pointer; font-size:16px; flex-shrink:0; }
.bottom-nav { display:flex; justify-content:space-around; padding:12px 0; border-top:0.5px solid var(--border); background:rgba(0,0,0,0.3); position:fixed; bottom:0; width:100%; max-width:480px; z-index:10; padding-bottom:env(safe-area-inset-bottom,12px); backdrop-filter:blur(12px); }
.nav-item { display:flex; flex-direction:column; align-items:center; gap:3px; font-size:15px; color:#ffffff; cursor:pointer; padding:4px 12px; min-height:44px; }
.nav-item.active { color:var(--accent); }
.nav-icon { font-size:20px; }
.fibro-logo { font-family:"Playfair Display",serif; font-style:italic; font-size:14px; color:var(--accent); text-align:center; padding:12px; opacity:0.5; }
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:100; align-items:center; justify-content:center; padding:24px; backdrop-filter:blur(8px); }
.modal-overlay.open { display:flex; }
.modal { background:#1a0a2e; border:1px solid rgba(192,132,252,0.3); border-radius:20px; padding:28px 24px; width:100%; max-width:340px; text-align:center; }
.modal h2 { font-family:"Playfair Display",serif; font-style:italic; font-size:22px; color:var(--accent); margin-bottom:6px; }
.modal p { font-size:12px; color:var(--muted); margin-bottom:20px; line-height:1.5; }
#qr-container { background:white; border-radius:12px; padding:16px; display:inline-block; margin-bottom:20px; }
.timer-ring { display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:20px; }
.timer-text { font-size:13px; color:var(--muted); }
.timer-countdown { font-size:16px; font-weight:600; color:var(--accent); min-width:48px; }
.timer-countdown.warning { color:#f59e0b; }
.timer-countdown.expired { color:#ff5c5c; }
.progress-bar { width:100%; height:3px; background:rgba(255,255,255,0.1); border-radius:2px; margin-bottom:20px; overflow:hidden; }
.progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2)); border-radius:2px; transition:width 1s linear; }
.token-code { background:rgba(192,132,252,0.1); border:1px dashed rgba(192,132,252,0.3); border-radius:8px; padding:10px; font-size:12px; color:var(--accent); margin-bottom:20px; word-break:break-all; }
.modal-btn { width:100%; padding:12px; border:none; border-radius:10px; font-family:"DM Sans",sans-serif; font-size:14px; cursor:pointer; margin-bottom:8px; min-height:44px; }
.modal-btn-primary { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#1a0a2e; font-weight:600; }
.modal-btn-ghost { background:transparent; color:var(--muted); border:1px solid var(--border); }
.modal-status { font-size:12px; padding:8px 12px; border-radius:8px; margin-bottom:12px; display:none; }
.modal-status.error { background:rgba(255,92,92,0.1); color:#ff5c5c; border:1px solid rgba(255,92,92,0.2); display:block; }
.modal-status.success { background:rgba(192,132,252,0.1); color:var(--accent); border:1px solid rgba(192,132,252,0.2); display:block; }
.expired-overlay { display:none; flex-direction:column; align-items:center; gap:12px; padding:20px 0; }
.expired-overlay.show { display:flex; }
.expired-icon { font-size:40px; }
body::before { content:''; position:fixed; inset:0; background:rgba(0,0,0,0.38); z-index:0; pointer-events:none; display:none; }
body.heeft-wallpaper::before { display:block; }
input, textarea { font-size:16px !important; }
</style>
</head>
<body><div class="top-bar">
  <span class="top-title">Vrienden</span>
  <button class="invite-btn" onclick="openInviteModal()">+ Uitnodigen</button>
</div>

<div class="search-bar">
  <input class="search-input" id="searchInput" placeholder="Zoek een vriend..." oninput="filterVrienden()">
</div>

<div id="vriendenLijst">
  <div style="padding:20px; text-align:center; color:var(--muted); font-size:12px;">Vrienden laden...</div>
</div>

<div class="fibro-logo">Fibro - jouw netwerk</div>

<div class="modal-overlay" id="inviteModal" onclick="sluitModalBuiten(event)">
  <div class="modal"> 
    <h2>Vriend uitnodigen</h2>
    <p>Genereer een QR code. Je vriend heeft 20 minuten om zich te registreren.</p>
    <div class="modal-status" id="modal-status"></div>
    <div id="qr-sectie" style="display:none;">
      <div id="qr-container"></div>
      <div class="timer-ring">
        <span class="timer-text">Geldig nog:</span>
        <span class="timer-countdown" id="timer-display">20:00</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="token-code" id="token-display"></div>
      <button onclick="kopieerLink()" style="margin-top:10px;width:100%;padding:10px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#1a0a2e;border:none;cursor:pointer;font-size:14px;font-weight:600;min-height:44px;">📋 Kopieer link</button>
      <div class="expired-overlay" id="expired-overlay">
        <div class="expired-icon">⏰</div>
        <p style="margin:0;">Deze invite is verlopen.</p>
        <button class="modal-btn modal-btn-primary" onclick="nieuweInvite()">Nieuwe QR genereren</button>
      </div>
    </div>
    <div id="qr-laden" style="padding:20px 0; color:var(--muted); font-size:13px;">Even laden...</div>
    <button class="modal-btn modal-btn-ghost" onclick="sluitModal()">Sluiten</button>
  </div>
</div>

<div class="bottom-nav">
  <div class="nav-item" onclick="window.location.href='index.html'"><div class="nav-icon">🏠</div>Home</div>
  <div class="nav-item active"><div class="nav-icon">👥</div>Vrienden</div>
  <div class="nav-item" onclick="window.location.href='chat.html'"><div class="nav-icon">💬</div>Chat</div>
  <div class="nav-item" onclick="window.location.href='profiel.html'"><div class="nav-icon">👤</div>Profiel</div>
</div>

<script type="module">
  import { laadThema } from './thema.js'
  import { laadWallpaper } from './wallpaper.js'
  import { supabase } from './supabase.js'
 
  const DUUR = 20 * 60
  let timerInterval = null
  let secondsLeft = DUUR 

  async function init() {
    await laadThema()
    await laadWallpaper()
    const { data: { session } } = await supabase.auth.getSession()
    if (!session) { window.location.href = 'login.html'; return }
    await laadVrienden(session.user.id)
  }

  async function laadVrienden(userId) {
    const { data, error } = await supabase
      .from('friendships')
      .select('friend_id, profiles!friendships_friend_id_fkey(id, username, display_name, bio, avatar_url, mood, online_status, offline_emoji, offline_bericht)')
      .eq('user_id', userId)
      .eq('status', 'accepted')

    const container = document.getElementById('vriendenLijst')

    if (error || !data || data.length === 0) {
      container.innerHTML = `
        <div style="padding:40px 20px; text-align:center; color:var(--muted); font-size:15px; line-height:1.8;">
          👥 Nog geen vrienden.<br>
          Klik op <strong style="color:var(--accent)">+ Uitnodigen</strong> om iemand uit te nodigen!
        </div>
      `
      return
    }

    container.innerHTML = '<div class="section-label">Vrienden</div>' + data.map(f => {
      const p = f.profiles
      const avatar = p.avatar_url || '👤'
      const naam = p.display_name || p.username
      const bio = p.bio || ''
      const mood = p.mood || ''
      return `
        <div class="friend-row" onclick="window.location.href='vriend-profiel.html?id=' + '${p.id}'">
          <div class="f-avatar">${avatar}</div>
          <div class="f-info">
            <div class="f-name">${naam}</div>
            ${bio ? `<div class="f-bio">${bio}</div>` : ''}
            ${mood ? `<div class="f-mood">💭 ${mood}</div>` : ''}
            <div style="font-size:11px;margin-top:2px;color:${p.online_status ? '#22c55e' : 'var(--muted)'}">              ${p.online_status ? '🟢 Online' : (p.offline_emoji || '🌙') + ' ' + (p.offline_bericht || 'Offline')}            </div>
          </div>
          <div class="f-btn" onclick="event.stopPropagation();window.location.href='chat.html'">💬</div>
          <div class="f-arrow">›</div>
        </div>
      `
    }).join('')
  }

  window.openInviteModal = async function() {
    document.getElementById('inviteModal').classList.add('open')
    await genereerInvite()
  }

  window.sluitModal = function() {
    document.getElementById('inviteModal').classList.remove('open')
    clearInterval(timerInterval)
  }

  window.sluitModalBuiten = function(e) {
    if (e.target.id === 'inviteModal') sluitModal()
  }

  async function genereerInvite() {
    document.getElementById('qr-laden').style.display = 'block'
    document.getElementById('qr-sectie').style.display = 'none'
    document.getElementById('expired-overlay').classList.remove('show')
    clearInterval(timerInterval)

    const { data: { user } } = await supabase.auth.getUser()
    const token = 'fibro-' + Math.random().toString(36).substring(2, 10) + '-' + Date.now().toString(36)
    const verlooptOm = new Date(Date.now() + DUUR * 1000).toISOString()

    const { error } = await supabase.from('invite_tokens').insert({
      token: token,
      expires_at: verlooptOm,
      ...(user ? { created_by: user.id } : {})
    })

    if (error) {
      toonStatus('error', 'Kon geen invite aanmaken. Probeer opnieuw.')
      document.getElementById('qr-laden').style.display = 'none'
      return
    }

    document.getElementById('qr-laden').style.display = 'none'
    document.getElementById('qr-sectie').style.display = 'block'

    document.getElementById('qr-container').innerHTML = ''
    const inviteLink = 'https://marcelpetrusma84-coder.github.io/Fibro/invite.html?token=' + token
    document.getElementById('token-display').textContent = inviteLink
    new QRCode(document.getElementById('qr-container'), {
      text: inviteLink,
      width: 200,
      height: 200,
      colorDark: '#1a0a2e',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    })

    secondsLeft = DUUR
    updateTimer()
    timerInterval = setInterval(() => {
      secondsLeft--
      updateTimer()
      if (secondsLeft <= 0) {
        clearInterval(timerInterval)
        toonVerlopen()
      }
    }, 1000)
  }

  function updateTimer() {
    const m = Math.floor(secondsLeft / 60)
    const s = secondsLeft % 60
    const display = document.getElementById('timer-display')
    const progress = document.getElementById('progress-fill')
    display.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
    display.className = 'timer-countdown'
    if (secondsLeft <= 60) display.classList.add('expired')
    else if (secondsLeft <= 300) display.classList.add('warning')
    progress.style.width = (secondsLeft / DUUR * 100) + '%'
  }

  function toonVerlopen() {
    document.getElementById('expired-overlay').classList.add('show')
    document.getElementById('timer-display').className = 'timer-countdown expired'
    document.getElementById('timer-display').textContent = '00:00'
    document.getElementById('progress-fill').style.width = '0%'
  }

  window.kopieerLink = function() {
    navigator.clipboard.writeText(document.getElementById('token-display').textContent)
  }

  window.nieuweInvite = async function() { 
    await genereerInvite()
  }

  function toonStatus(type, tekst) {
    const el = document.getElementById('modal-status')
    el.className = 'modal-status ' + type
    el.textContent = tekst
  }

  init()
</script>

<script>
function filterVrienden() {
  var query = document.getElementById('searchInput').value.toLowerCase()
  document.querySelectorAll('.friend-row').forEach(function(row) {
    var naam = row.querySelector('.f-name').textContent.toLowerCase()
    row.style.display = naam.indexOf(query) !== -1 ? 'flex' : 'none'
  })
  document.querySelectorAll('.section-label').forEach(function(l) {
    l.style.display = query ? 'none' : 'block'
  })
}
</script>

<script src="swipe.js"></script>

</body>
</html>
